<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5" style="max-width: 400px;">

    <h3 class="text-center">Expense Tracker Login</h3>

    {% if error %}
    <div class="alert alert-danger mt-3" role="alert">
        {{ error }}
    </div>
    {% endif %}

    <form method="post" action="/ui/login" class="mt-4">

        <input class="form-control mb-2" name="username" placeholder="Username" required>

        <input class="form-control mb-2" name="password" type="password" placeholder="Password" required>

        <div class="form-check mb-3">
            <input class="form-check-input" type="checkbox" value="true" id="remember_me" name="remember_me">
            <label class="form-check-label" for="remember_me">
                Remember me
            </label>
        </div>

        <button class="btn btn-primary w-100" type="submit">Login</button>

    </form>

    <div class="text-center mt-3">
        <a href="/ui/register">Create a new account</a>
    </div>

</div>

</body>
</html>
