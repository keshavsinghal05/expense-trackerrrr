<!DOCTYPE html>
<html>
<head>
    <title>Add Expense</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5" style="max-width: 500px;">

    <h3>Add Expense</h3>

    <form method="post" action="/ui/add-expense">

        <input class="form-control mb-2" name="amount" type="number" step="0.01" placeholder="Amount" required>

        <input class="form-control mb-2" name="category" placeholder="Category" required>

        <input class="form-control mb-2" name="description" placeholder="Description" required>

        <input class="form-control mb-2" name="expense_date" type="date" required>

        <button class="btn btn-primary w-100 mb-2" type="submit">Save</button>
        <a href="/ui/dashboard" class="btn btn-secondary w-100">Cancel</a>

    </form>

</div>

</body>
</html>
