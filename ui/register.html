<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5" style="max-width: 500px;">

    <h3 class="text-center">Create Account</h3>

    {% if error %}
    <div class="alert alert-danger mt-3" role="alert">
        {{ error }}
    </div>
    {% endif %}

    {% if success %}
    <div class="alert alert-success mt-3" role="alert">
        {{ success }}
    </div>
    {% endif %}

    <form method="post" action="/ui/register" class="mt-4" onsubmit="return validateRegister();">

        <input class="form-control mb-2" name="username" placeholder="Username" required>

        <input class="form-control mb-2" name="email" type="email" placeholder="Email" required>

        <input id="password" class="form-control mb-2" name="password" type="password" placeholder="Password" required>

        <input id="confirm_password" class="form-control mb-2" name="confirm_password" type="password" placeholder="Confirm Password" required>

        <button class="btn btn-primary w-100" type="submit">Register</button>

    </form>

    <script>
        function validateRegister() {
            const pwd = document.getElementById('password').value;
            const confirm = document.getElementById('confirm_password').value;
            if (pwd !== confirm) {
                alert('Passwords do not match.');
                return false;
            }
            return true;
        }
    </script>

    <div class="text-center mt-3">
        <a href="/ui/login">Already have an account? Login</a>
    </div>

</div>

</body>
</html>
